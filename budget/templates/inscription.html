<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Budget App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 450px;
        }
        h2 { text-align: center; color: #333; margin-bottom: 30px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #555; font-weight: 600; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .messages { margin-bottom: 20px; }
        .message { padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 14px; }
        .message.error { background: #f8d7da; color: #721c24; }
        .back { text-align: center; margin-top: 20px; }
        .back a { color: #667eea; text-decoration: none; }
        .hint { color: #888; font-size: 12px; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>📝 Inscription</h2>

        {% if erreurs %}
            <div class="messages">
                {% for err in erreurs %}
                    <div class="message error">{{ err }}</div>
                {% endfor %}
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" value="{{ username|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" value="{{ email|default:'' }}" required>
            </div>
            <div class="form-group">
                <label>Mot de passe (min 8 caracteres)</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Confirmer mot de passe</label>
                <input type="password" name="password_confirm" required>
            </div>
            <div class="form-group">
                <label>Budget mensuel (MAD) *</label>
                <input type="number" name="budgetMensuel" step="0.01" min="1000" value="{{ budgetMensuel|default:'' }}" required placeholder="Minimum 1000 MAD">
                <div class="hint">Minimum requis : 1000 MAD</div>
            </div>
            <button type="submit" class="btn">S'inscrire</button>
        </form>

        <div class="back">
            <a href="{% url 'accueil' %}">← Deja un compte ? Se connecter</a>
        </div>
    </div>
</body>
</html>
